services:
  - type: web
    name: sermon-intelligence
    runtime: docker
    plan: starter
    region: singapore
    envVars:
      - key: PORT
        value: 7860
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: sermon-data
      mountPath: /app/data
      sizeGB: 1
