{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-xl border border-slate-800 rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-2">AlphaPulse</h1>
            <p class="text-slate-400">Secure AI Intelligence Portal</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500 text-red-200 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('routes.login') }}" class="space-y-6">
            <div>
                <label for="access_code" class="block text-sm font-medium text-slate-300 mb-2">Master Access Code</label>
                <input type="password" id="access_code" name="access_code" required
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-center tracking-widest"
                    placeholder="••••••••">
            </div>
            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-blue-500/20">
                Authenticate
            </button>
        </form>

        <div class="mt-8 text-center">
            <div class="inline-block p-1 bg-slate-800 rounded-full">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            </div>
            <span class="text-xs text-slate-500 ml-2">System Protected</span>
        </div>
    </div>
</div>
{% endblock %}
